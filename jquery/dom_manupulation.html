<!-- html(): Get or set the HTML content of an element.
text(): Get or set the text content of an element.
append(): Insert content at the end of an element.
prepend(): Insert content at the beginning of an element.
after(): Insert content after an element.
before(): Insert content before an element.
appendTo(): Append elements to the specified target.
prependTo(): Prepend elements to the specified target.
wrap(): Wrap an element with another element.
unwrap(): Remove the parent element of selected elements.
wrapAll(): Wrap all selected elements in a single wrapper.
wrapInner(): Wrap the inner content of an element.
clone(): Clone an element.
remove(): Remove elements from the DOM.
empty(): Remove all child elements.
detach(): Remove elements while retaining data and events.
replaceWith(): Replace an element with new content.
replaceAll(): Replace all matched elements with new content.
val(): Get or set the value of form elements.
attr(): Get or set attributes of an element.
removeAttr(): Remove an attribute from an element.
prop(): Get or set properties of an element.
removeProp(): Remove a property from an element.
data(): Get or set data attributes for an element.
toggle(): Toggle visibility of elements. -->
