<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Animation Examples</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .box {
            width: 100px;
            height: 100px;
            background-color: steelblue;
            margin: 20px;
        }
        .container {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>jQuery Animation Examples</h1>
    <button id="fade">Fade In/Out</button>
    <button id="slide">Slide Toggle</button>
    <button id="animate">Custom Animation</button>
    <button id="stop">Stop Animation</button>

    <div class="container">
        <div class="box" id="fadeBox"></div>
        <div class="box" id="slideBox"></div>
        <div class="box" id="animateBox"></div>
    </div>

    <script>
        $(document).ready(function() {
            // Fade In/Out example
            $("#fade").click(function() {
                $("#fadeBox").fadeToggle(1000);
            });

            // Slide Toggle example
            $("#slide").click(function() {
                $("#slideBox").slideToggle(1000);
            });

            // Custom Animation example
            $("#animate").click(function() {
                $("#animateBox").animate({
                    width: "200px",
                    height: "200px",
                    left: "100px",
                    backgroundColor: "#ff6347"
                }, 1500, function() {
                    $(this).animate({ 
                        width: "100px", 
                        height: "100px", 
                        left: "0px",
                        backgroundColor: "steelblue"
                    }, 1500);
                });
            });

            // Stop Animation example
            $("#stop").click(function() {
                $("#animateBox").stop();
            });
        });
    </script>
</body>
</html>
