<!-- 
parent(): Selects the immediate parent.
parents(): Selects all ancestors.
parentsUntil(): Selects ancestors up to a specific element.
children(): Selects all direct children.
find(): Selects all descendants matching a selector.
siblings(): Selects all siblings.
next(): Selects the next sibling.
nextAll(): Selects all following siblings.
nextUntil(): Selects following siblings until a specific element.
prev(): Selects the previous sibling.
prevAll(): Selects all preceding siblings.
prevUntil(): Selects preceding siblings until a specific element.
first(): Selects the first element among a group.
last(): Selects the last element among a group.
eq(): Selects an element by its index.
filter(): Filters elements based on a condition.
not(): Excludes elements matching a selector.
has(): Selects elements containing a specific child.
is(): Checks if an element matches a selector.
each(): Iterates over elements.
closest(): Finds the closest ancestor matching a selector.
add(): Adds elements to the matched set.
end(): Ends the most recent filtering operation.
contents(): Selects all child nodes, including text. -->
