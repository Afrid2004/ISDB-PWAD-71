<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Calculator</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>
    <h1>Loan Calculator</h1>
    <form id="loanForm">
        <label for="amount">Loan Amount:</label>
        <input type="number" id="amount" required><br><br>

        <label for="interest">Annual Interest Rate (%):</label>
        <input type="number" id="interest" step="0.01" required><br><br>

        <label for="months">Number of Months:</label>
        <input type="number" id="months" required><br><br>

        <button type="button" id="calculate">Calculate</button>
    </form>

    <table id="installmentTable" style="display:none;">
        <thead>
            <tr>
                <th>Month</th>
                <th>Principal Payment</th>
                <th>Interest Payment</th>
                <th>Total Payment</th>
                <th>Remaining Balance</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <script>
        $(document).ready(function () {
            $('#calculate').click(function () {
                const amount = parseFloat($('#amount').val());
                const annualInterest = parseFloat($('#interest').val()) / 100;
                const months = parseInt($('#months').val());

                if (isNaN(amount) || isNaN(annualInterest) || isNaN(months) || amount <= 0 || annualInterest < 0 || months <= 0) {
                    alert('Please enter valid input values.');
                    return;
                }

                var total= amount;
                var totalwithinterest= amount + (amount * annualInterest);
                var total_interest= amount * annualInterest;
                var montlyPaymetn= total/months;
                var montlyPaymetninterest= total_interest/months;
                var total_monthly_payment= montlyPaymetn+montlyPaymetninterest;

                // const monthlyInterest = annualInterest / 12;
                // const monthlyPayment = (amount * monthlyInterest) / (1 - Math.pow(1 + monthlyInterest, -months));
                 let remainingBalance = totalwithinterest;

                const $tableBody = $('#installmentTable tbody');
                $tableBody.empty();

                for (let i = 1; i <= months; i++) {
                    // const interestPayment = remainingBalance * monthlyInterest;
                    // const principalPayment = monthlyPayment - interestPayment;
                    // remainingBalance -= principalPayment;
                     remainingBalance -= total_monthly_payment;
                     
                    $tableBody.append(`
                        <tr>
                            <td>${i}</td>
                            <td>${montlyPaymetn.toFixed(2)}</td>
                            <td>${montlyPaymetninterest.toFixed(2)}</td>
                            <td>${total_monthly_payment.toFixed(2)}</td>
                            <td>${remainingBalance > 0 ? remainingBalance.toFixed(2) : '0.00'}</td>
                        </tr>
                    `);
                }

                $('#installmentTable').show();
            });
        });
    </script>
</body>
</html>
