<!-- Explanation of jQuery Event Binding Methods
on(): Bind one or more events to elements.
off(): Remove events bound with .on().
one(): Bind an event that triggers only once.
delegate(): Bind events to current or future child elements.
undelegate(): Remove delegated events.
bind(): Bind events to elements (legacy method, replaced by .on()).
unbind(): Remove events bound with .bind() (legacy method).
Shortcut methods:
hover(), click(), dblclick(), focus(), blur(), change(), etc.
Keyboard events:
keydown(), keyup(), keypress().
Mouse events:
mousedown(), mouseup(), mousemove().
Other events:
submit(), resize(), scroll().
Custom events: Trigger and bind user-defined events -->
